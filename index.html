<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CraftEdge — Design Your Custom T-Shirt</title>
  <meta name="description" content="Design your own custom t-shirt with live preview. Add text, choose fonts, colors, and download your design.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Bebas+Neue&family=Permanent+Marker&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="/" class="logo">
        <svg class="logo__icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="currentColor"/>
          <path d="M7 14l5 5L21 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo__text">CraftEdge</span>
      </a>
      <nav class="header__nav">
        <span class="header__tag">Custom T-Shirt Designer</span>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container product">

      <section class="preview" aria-label="T-shirt preview">
        <div class="preview__stage" id="previewStage">
          <svg class="tshirt-svg" viewBox="0 0 400 460" xmlns="http://www.w3.org/2000/svg">
            <path class="tshirt-body" d="
              M 120 50
              L 80 70
              L 20 120
              L 50 150
              L 80 130
              L 80 400
              Q 80 430 110 430
              L 290 430
              Q 320 430 320 400
              L 320 130
              L 350 150
              L 380 120
              L 320 70
              L 280 50
              Q 260 90 200 90
              Q 140 90 120 50
              Z
            " fill="var(--shirt-color)" stroke="var(--shirt-stroke)" stroke-width="1.5"/>
            <path class="tshirt-collar" d="
              M 120 50
              Q 140 90 200 90
              Q 260 90 280 50
              Q 260 30 200 25
              Q 140 30 120 50
              Z
            " fill="var(--shirt-color)" stroke="var(--shirt-stroke)" stroke-width="1.5"/>
            <ellipse cx="200" cy="55" rx="40" ry="22" fill="var(--collar-shadow)" />
          </svg>
          <div class="preview__text-layer" id="textLayer">
            <span class="preview__custom-text" id="previewText">Your Text Here</span>
          </div>
        </div>
        <p class="preview__hint">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M8 4v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Drag text to reposition
        </p>
      </section>

      <section class="controls" aria-label="Customization options">
        <h1 class="controls__title">Design Your Tee</h1>
        <p class="controls__subtitle">Customize every detail and see changes in real-time</p>

        <div class="control-group">
          <label class="control-label" for="textInput">Your Text</label>
          <input
            type="text"
            id="textInput"
            class="control-input"
            placeholder="Type something awesome..."
            maxlength="40"
            autocomplete="off"
          >
          <span class="control-hint"><span id="charCount">0</span>/40 characters</span>
        </div>

        <div class="control-group">
          <label class="control-label" for="fontSelect">Font Family</label>
          <select id="fontSelect" class="control-select">
            <option value="'Inter', sans-serif">Inter (Clean)</option>
            <option value="'Playfair Display', serif">Playfair Display (Elegant)</option>
            <option value="'Bebas Neue', sans-serif">Bebas Neue (Bold)</option>
            <option value="'Permanent Marker', cursive">Permanent Marker (Hand-drawn)</option>
            <option value="'Orbitron', sans-serif">Orbitron (Futuristic)</option>
          </select>
        </div>

        <div class="control-row">
          <div class="control-group control-group--half">
            <label class="control-label" for="textColor">Text Color</label>
            <div class="color-input-wrapper">
              <input type="color" id="textColor" class="control-color" value="#ffffff">
              <span class="color-value" id="textColorValue">#ffffff</span>
            </div>
          </div>
          <div class="control-group control-group--half">
            <label class="control-label" for="fontSize">Size: <span id="fontSizeValue">24</span>px</label>
            <input type="range" id="fontSize" class="control-range" min="12" max="48" value="24" step="1">
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">T-Shirt Color</label>
          <div class="color-swatches" id="shirtColors" role="radiogroup" aria-label="T-shirt color">
            <button class="swatch swatch--active" data-color="#2d2d2d" data-stroke="#444" data-shadow="rgba(0,0,0,0.15)" aria-label="Black" title="Black" style="background:#2d2d2d"></button>
            <button class="swatch" data-color="#f5f5f5" data-stroke="#ddd" data-shadow="rgba(0,0,0,0.06)" aria-label="White" title="White" style="background:#f5f5f5"></button>
            <button class="swatch" data-color="#1a3a5c" data-stroke="#2a4a6c" data-shadow="rgba(0,0,0,0.12)" aria-label="Navy" title="Navy" style="background:#1a3a5c"></button>
            <button class="swatch" data-color="#8b2252" data-stroke="#9b3262" data-shadow="rgba(0,0,0,0.12)" aria-label="Maroon" title="Maroon" style="background:#8b2252"></button>
            <button class="swatch" data-color="#2e6b4f" data-stroke="#3e7b5f" data-shadow="rgba(0,0,0,0.12)" aria-label="Forest Green" title="Forest Green" style="background:#2e6b4f"></button>
            <button class="swatch" data-color="#c75726" data-stroke="#d76736" data-shadow="rgba(0,0,0,0.12)" aria-label="Burnt Orange" title="Burnt Orange" style="background:#c75726"></button>
          </div>
        </div>

        <hr class="controls__divider">

        <div class="control-row control-row--bottom">
          <div class="control-group control-group--half">
            <label class="control-label" for="quantity">Quantity</label>
            <div class="quantity-picker">
              <button class="qty-btn" id="qtyMinus" aria-label="Decrease quantity">−</button>
              <input type="number" id="quantity" class="qty-input" value="1" min="1" max="99" readonly>
              <button class="qty-btn" id="qtyPlus" aria-label="Increase quantity">+</button>
            </div>
          </div>
          <div class="control-group control-group--half">
            <p class="price-display">
              <span class="price-label">Price</span>
              <span class="price-amount" id="priceDisplay">$29.99</span>
            </p>
          </div>
        </div>

        <div class="controls__actions">
          <button class="btn btn--primary" id="addToCart">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 6h10l-1.5 7H7.5L6 6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 6L5 3H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="16" r="1" fill="currentColor"/><circle cx="14" cy="16" r="1" fill="currentColor"/></svg>
            Add to Cart
          </button>
          <button class="btn btn--secondary" id="downloadBtn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3v10m0 0l-3-3m3 3l3-3M4 15v2h12v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Download Design
          </button>
        </div>
      </section>

    </div>
  </main>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <footer class="footer">
    <div class="container footer__inner">
      <p>&copy; 2026 CraftEdge. Built with care.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
